name: Native Linux setup
description: >-
  Install the system Qt/FFmpeg/libass/GL dev stack plus a Kitware CMake build
  (newer than the distro package).

inputs:
  cmake-version:
    description: CMake version to install from Kitware.
    required: true

runs:
  using: composite
  steps:
    - name: Install dependencies
      shell: bash
      run: |
        apt-get update
        apt-get install -y --no-install-recommends \
          g++ \
          ninja-build \
          git \
          curl \
          ca-certificates \
          pkg-config \
          qt6-base-dev \
          qt6-declarative-dev \
          qt6-multimedia-dev \
          libavformat-dev \
          libavcodec-dev \
          libavutil-dev \
          libswscale-dev \
          libswresample-dev \
          libavfilter-dev \
          libass-dev \
          libgl1-mesa-dev \
          libvulkan-dev \
          glslang-tools
    - name: Install CMake (Kitware)
      shell: bash
      run: |
        curl -fL "https://github.com/Kitware/CMake/releases/download/v${{ inputs.cmake-version }}/cmake-${{ inputs.cmake-version }}-linux-x86_64.sh" \
          -o /tmp/cmake-install.sh
        chmod +x /tmp/cmake-install.sh
        /tmp/cmake-install.sh --skip-license --prefix=/usr/local
