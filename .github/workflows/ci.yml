name: CI

on:
  push:
    branches: [ main ]
    tags: [ '*.*.*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: read

env:
  DEBIAN_FRONTEND: noninteractive
  BUILD_DIR: build
  CMAKE_VERSION: "4.3.0"
  QT_VERSION: "6.11.1"
  # vcpkg commit the manifest pins via builtin-baseline (vcpkg.json). The Windows
  # build fetches this commit so the FFmpeg + libass versions are reproducible;
  # bump alongside the manifest baseline.
  VCPKG_BASELINE: "d592849579fb1fb22f87406b2184522ea21a8783"

jobs:
  # ── Unit tests ──────────────────────────────────────────────────────────────
  # Native-Linux QtTest suite over the platform-independent logic. Runs first;
  # the build jobs depend on it via `needs:`.
  test:
    runs-on: ubuntu-latest
    container: ubuntu:24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            g++ \
            cmake \
            ninja-build \
            git \
            ca-certificates \
            qt6-base-dev
      - name: Build & run tests
        run: |
          cmake -S tests -B build-tests -G Ninja -DCMAKE_BUILD_TYPE=Debug
          cmake --build build-tests
          # --output-junit produces a JUnit report uploaded as an artifact below.
          ctest --test-dir build-tests --output-on-failure --output-junit junit.xml
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build-tests/junit.xml

  # ── Windows build (native MSVC) ─────────────────────────────────────────────
  # Produces FrameLift-win64.zip on a native Windows runner with MSVC. The
  # windows-latest image ships CMake, Ninja, vcpkg, and the VS 2026 MSVC toolset
  # preinstalled. Qt comes from the official prebuilt MSVC package; FFmpeg and
  # libass come from the vcpkg manifest (vcpkg.json) for the release-only
  # x64-windows triplet. Keeping Qt out of vcpkg avoids source-building Qt on
  # cache misses, which can exhaust the Windows runner disk.
  build-windows:
    needs: test
    runs-on: windows-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        shell: bash
    env:
      USERNAME: ${{ github.repository_owner }}
      FEED_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
      # vcpkg's binary cache is a GitHub Packages NuGet feed so heavy libraries
      # such as FFmpeg do not rebuild from source on every run.
      VCPKG_BINARY_SOURCES: "clear;nuget,https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json,readwrite"
      # Release-only triplet
      VCPKG_TRIPLET: x64-windows-release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install patched aqtinstall
        run: python -m pip install --upgrade --force-reinstall --no-cache-dir git+https://github.com/miurahr/aqtinstall.git@refs/pull/1000/head
      - name: Install prebuilt Qt
        uses: jurplel/install-qt-action@v4
        with:
          setup-python: false
          aqtsource: git+https://github.com/miurahr/aqtinstall.git@refs/pull/1000/head
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          dir: ${{ runner.temp }}/qt
          # Qt Declarative/QML/Quick is part of the base desktop package; only
          # install add-on modules here.
          modules: qtmultimedia
      - name: Set up MSVC environment
        # Locate the preinstalled VS toolset with vswhere and export its vcvars64
        # environment so the Ninja single-config build picks up cl.exe — matching
        # the CMake presets used elsewhere, with no third-party setup action.
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * `
            -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          cmd /c "`"$vsPath\VC\Auxiliary\Build\vcvars64.bat`" && set" | ForEach-Object {
            if ($_ -match '^([^=]+)=(.*)$') {
              "$($matches[1])=$($matches[2])" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            }
          }
      - name: Pin vcpkg baseline
        # The runner ships a prebuilt vcpkg; fetch the manifest's pinned baseline
        # commit so builtin-baseline resolves to reproducible library versions.
        run: git -C "$VCPKG_INSTALLATION_ROOT" fetch --depth 1 origin "$VCPKG_BASELINE"
      - name: Configure vcpkg binary cache
        env:
          VCPKG_NUGET_TOKEN: ${{ secrets.VCPKG_PAT_TOKEN }}
        run: |
          # nuget.exe runs natively on Windows — no Mono shim needed.
          nuget="$("$VCPKG_INSTALLATION_ROOT/vcpkg.exe" fetch nuget | tail -n 1)"
          "$nuget" sources add \
            -Source "$FEED_URL" \
            -StorePasswordInClearText \
            -Name "$USERNAME" \
            -UserName "$USERNAME" \
            -Password "$VCPKG_NUGET_TOKEN"
          "$nuget" setapikey "$VCPKG_NUGET_TOKEN" \
            -Source "$FEED_URL"
      - name: Configure
        run: |
          echo "vcpkg binary sources: $VCPKG_BINARY_SOURCES"
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            VERSION="$GITHUB_REF_NAME"
            VERSION_DISPLAY="$VERSION"
          else
            VERSION="0.0.0"
            VERSION_DISPLAY="git-$(echo "$GITHUB_SHA" | cut -c1-8)"
          fi
          # Manifest mode installs FFmpeg + libass (vcpkg.json) for the
          # release-only triplet before the host build proceeds. Qt is resolved
          # from the prebuilt MSVC package installed above.
          cmake -S . -B "$BUILD_DIR" -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET="$VCPKG_TRIPLET" \
            -DVCPKG_HOST_TRIPLET="$VCPKG_TRIPLET" \
            -DQt6_DIR="$Qt6_DIR" \
            -DCMAKE_C_COMPILER=cl \
            -DCMAKE_CXX_COMPILER=cl \
            -DCMAKE_BUILD_TYPE=Release \
            -DFRAMELIFT_BUILD_TESTS=OFF \
            -DFRAMELIFT_VERSION="$VERSION" \
            -DFRAMELIFT_VERSION_DISPLAY="$VERSION_DISPLAY"
      - name: Build
        run: cmake --build "$BUILD_DIR" --parallel
      - name: Package
        run: |
          WINDEPLOYQT="$(command -v windeployqt.exe)"
          STAGE="$RUNNER_TEMP/stage"
          mkdir -p "$STAGE/plugins"
          cp "$BUILD_DIR/framelift.exe" "$STAGE/"
          cp "$BUILD_DIR"/plugins/*.dll "$STAGE/plugins/"
          # Stage the Qt runtime: platform/imageformat/tls plugins plus the QML
          # modules. The plugins' Qt Quick surfaces are compiled into resources, so
          # point --qmldir at the source tree for windeployqt's import scan.
          "$WINDEPLOYQT" --release --compiler-runtime --qmldir "$PWD" --dir "$STAGE" "$STAGE/framelift.exe"
          for p in "$STAGE"/plugins/*.dll; do
            "$WINDEPLOYQT" --release --no-compiler-runtime --qmldir "$PWD" --dir "$STAGE" "$p"
          done
          # FFmpeg/libass runtime DLLs (+ transitive deps) from vcpkg. Copy
          # after windeployqt so FrameLift's FFmpeg wins any filename overlap
          # with Qt Multimedia's backend runtime.
          cp "$BUILD_DIR"/vcpkg_installed/$VCPKG_TRIPLET/bin/*.dll "$STAGE/"
          (cd "$STAGE" && 7z a "$GITHUB_WORKSPACE/$BUILD_DIR/FrameLift-win64.zip" .)
          # The SDK is packaged by the dedicated `build-sdk` job.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FrameLift-win64
          path: ${{ env.BUILD_DIR }}/FrameLift-win64.zip

  # ── Native Linux build ──────────────────────────────────────────────────────
  # Builds the host + cross-platform plugins natively against system Qt/FFmpeg.
  # Windows-only plugins are disabled by module platform metadata.
  # Produces FrameLift-linux-x64.tar.gz.
  #
  # ubuntu:25.04 carries the Qt 6 development stack used by the native build.
  build-linux:
    needs: test
    runs-on: ubuntu-latest
    container: ubuntu:25.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/native-linux-setup
        with:
          cmake-version: ${{ env.CMAKE_VERSION }}
      - name: Build
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            VERSION="$GITHUB_REF_NAME"
            VERSION_DISPLAY="$VERSION"
          else
            VERSION="0.0.0"
            VERSION_DISPLAY="git-$(echo "$GITHUB_SHA" | cut -c1-8)"
          fi
          cmake -S . -B "$BUILD_DIR" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DFRAMELIFT_BUILD_TESTS=OFF \
            -DFRAMELIFT_BUILD_LAUNCH_TESTS=ON \
            -DFRAMELIFT_VERSION="$VERSION" \
            -DFRAMELIFT_VERSION_DISPLAY="$VERSION_DISPLAY"
          cmake --build "$BUILD_DIR" --target all_qmllint
          cmake --build "$BUILD_DIR" --parallel
          test -f "$BUILD_DIR/framelift"
          test -f "$BUILD_DIR/plugins/framelift.playlist.so"
          ctest --test-dir "$BUILD_DIR" -L launch --output-on-failure
          (cd "$BUILD_DIR" && tar -czf FrameLift-linux-x64.tar.gz framelift plugins)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FrameLift-linux
          path: ${{ env.BUILD_DIR }}/FrameLift-linux-x64.tar.gz

  # ── Plugin SDK package ──────────────────────────────────────────────────────
  # The SDK is platform-neutral source (headers + helper .cpp compiled per plugin),
  # so it's packaged in its own job. Configure (no host build) stages the `sdk`
  # install component and zips it. Self-containment (the package builds a working
  # plugin outside the source tree) is validated by the FrameLift-Examples repo's
  # CI, which builds the worked examples against this published zip.
  # Produces FrameLift-sdk-<ver>.zip.
  build-sdk:
    needs: test
    runs-on: ubuntu-latest
    container: ubuntu:25.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/native-linux-setup
        with:
          cmake-version: ${{ env.CMAKE_VERSION }}
      - name: Package & validate SDK
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            VERSION="$GITHUB_REF_NAME"
          else
            VERSION="0.0.0"
          fi
          cmake -S . -B "$BUILD_DIR" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DFRAMELIFT_BUILD_TESTS=OFF \
            -DFRAMELIFT_VERSION="$VERSION"
          cmake --install "$BUILD_DIR" --prefix "$GITHUB_WORKSPACE/sdk-stage" --component sdk
          # cmake -E tar with --format=zip avoids needing the zip package installed.
          (cd "$GITHUB_WORKSPACE/sdk-stage" && cmake -E tar cf "$GITHUB_WORKSPACE/$BUILD_DIR/FrameLift-sdk-${VERSION}.zip" --format=zip .)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FrameLift-sdk
          path: ${{ env.BUILD_DIR }}/FrameLift-sdk-*.zip

  # ── Release ─────────────────────────────────────────────────────────────────
  # On <X.Y.Z> tags, attach the build outputs to a GitHub Release with
  # auto-generated notes.
  release:
    needs: [ build-windows, build-linux, build-sdk ]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/FrameLift-win64/FrameLift-win64.zip
            artifacts/FrameLift-linux/FrameLift-linux-x64.tar.gz
            artifacts/FrameLift-sdk/FrameLift-sdk-*.zip
