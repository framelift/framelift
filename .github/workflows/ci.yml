name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]

env:
  DEBIAN_FRONTEND: noninteractive
  BUILD_DIR: build
  CMAKE_VERSION: "4.3.0"
  # vcpkg commit the manifest pins via builtin-baseline (vcpkg.json). The Windows
  # build checks vcpkg out at this commit so the FFmpeg + libass versions are
  # reproducible; bump alongside the manifest baseline.
  VCPKG_BASELINE: "d592849579fb1fb22f87406b2184522ea21a8783"

jobs:
  # ── Unit tests ──────────────────────────────────────────────────────────────
  # Native-Linux GoogleTest suite over the platform-independent logic. Runs first;
  # the build jobs depend on it via `needs:`.
  test:
    runs-on: ubuntu-latest
    container: ubuntu:24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            g++ \
            cmake \
            ninja-build \
            git \
            ca-certificates
      - name: Build & run tests
        run: |
          cmake -S tests -B build-tests -G Ninja -DCMAKE_BUILD_TYPE=Debug
          cmake --build build-tests
          # --output-junit produces a JUnit report uploaded as an artifact below.
          ctest --test-dir build-tests --output-on-failure --output-junit junit.xml
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build-tests/junit.xml

  # ── Windows build (MinGW cross-compile) ─────────────────────────────────────
  # Produces FrameLift-win64.zip. SDL3, FFmpeg, and libass all come from the vcpkg
  # manifest (vcpkg.json), built for the x64-mingw-dynamic triplet so they
  # cross-compile in this Linux container.
  build-windows:
    needs: test
    runs-on: ubuntu-latest
    container: ubuntu:24.04
    env:
      VCPKG_ROOT: ${{ github.workspace }}/.cache/vcpkg
      # vcpkg's binary cache — restored via actions/cache so the libraries aren't
      # rebuilt from source on every run.
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.cache/vcpkg-archives
      # mingw-dynamic for the target libs; host tools (build-time) use native Linux.
      VCPKG_DEFAULT_TRIPLET: x64-mingw-dynamic
      VCPKG_DEFAULT_HOST_TRIPLET: x64-linux
    steps:
      - uses: actions/checkout@v4
      - name: Restore vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: .cache/vcpkg-archives
          key: win-vcpkg-${{ env.VCPKG_BASELINE }}
      - name: Install toolchain
        # mingw-w64 toolchain (target) + native g++ (vcpkg builds host-triplet
        # x64-linux build tools when cross-compiling) + vcpkg's source-build toolchain
        # (nasm/meson/ninja/etc. for FFmpeg's dav1d and codec deps).
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git \
            ninja-build \
            make \
            g++ \
            mingw-w64 \
            curl \
            tar \
            zip \
            unzip \
            p7zip-full \
            ca-certificates \
            pkg-config \
            libicu-dev \
            nasm \
            meson \
            python3 \
            bison \
            flex \
            autoconf \
            automake \
            libtool-bin
          curl -fL "https://github.com/Kitware/CMake/releases/download/v${CMAKE_VERSION}/cmake-${CMAKE_VERSION}-linux-x86_64.sh" \
            -o /tmp/cmake-install.sh
          chmod +x /tmp/cmake-install.sh
          /tmp/cmake-install.sh --skip-license --prefix=/usr/local
      - name: Bootstrap vcpkg
        # vcpkg, pinned to the manifest's builtin-baseline for reproducible deps.
        run: |
          mkdir -p .cache/vcpkg-archives
          if [ ! -d "$VCPKG_ROOT/.git" ]; then
            git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT"
          fi
          git -C "$VCPKG_ROOT" fetch --depth 1 origin "$VCPKG_BASELINE"
          git -C "$VCPKG_ROOT" checkout "$VCPKG_BASELINE"
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics
      - name: Build
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
            VERSION_DISPLAY="$VERSION"
          else
            VERSION="0.0.0"
            VERSION_DISPLAY="git-$(echo "$GITHUB_SHA" | cut -c1-8)"
          fi
          # Manifest mode: configuring installs ffmpeg + libass (vcpkg.json) for the
          # target triplet before the host build proceeds.
          cmake -S . -B "$BUILD_DIR" -G Ninja \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-mingw-dynamic \
            -DVCPKG_HOST_TRIPLET=x64-linux \
            -DVCPKG_APPLOCAL_DEPS=OFF \
            -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++-posix \
            -DCMAKE_BUILD_TYPE=Release \
            -DFRAMELIFT_BUILD_TESTS=OFF \
            -DFRAMELIFT_ENABLE_UPDATER=ON \
            -DFRAMELIFT_VERSION="$VERSION" \
            -DFRAMELIFT_VERSION_DISPLAY="$VERSION_DISPLAY"
          cmake --build "$BUILD_DIR" --parallel
          # vcpkg's app-local DLL deployment is MSVC-only, so stage the mingw-dynamic
          # runtime DLLs (SDL3.dll, avcodec-*.dll, ass-*.dll + transitive deps) next to the exe.
          cp "$BUILD_DIR"/vcpkg_installed/x64-mingw-dynamic/bin/*.dll "$BUILD_DIR"/
          # The vcpkg-built DLLs (x64-mingw-dynamic) dynamically link the MinGW toolchain
          # runtimes (libgcc_s_seh-1, libstdc++-6, libwinpthread-1). These aren't in
          # vcpkg's bin dir, so locate them via the compiler and stage them too.
          GCC_LIBDIR=$(dirname "$(x86_64-w64-mingw32-gcc-posix -print-file-name=libgcc_s_seh-1.dll)")
          cp "$GCC_LIBDIR/libgcc_s_seh-1.dll" "$BUILD_DIR/"
          [ -f "$GCC_LIBDIR/libstdc++-6.dll" ] && cp "$GCC_LIBDIR/libstdc++-6.dll" "$BUILD_DIR/"
          WINPTHREAD=$(x86_64-w64-mingw32-gcc-posix -print-file-name=libwinpthread-1.dll)
          [ -f "$WINPTHREAD" ] && cp "$WINPTHREAD" "$BUILD_DIR/"
          (cd "$BUILD_DIR" && 7z a FrameLift-win64.zip FrameLift.exe *.dll Plugins)
          # The SDK is packaged by the dedicated `build-sdk` job. The in-tree HelloPlugin
          # (FRAMELIFT_BUILD_SDK_EXAMPLE) still builds here as a Windows-side SDK bitrot guard.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FrameLift-win64
          path: ${{ env.BUILD_DIR }}/FrameLift-win64.zip

  # ── Native Linux build ──────────────────────────────────────────────────────
  # Builds the host + cross-platform plugins natively against system SDL3/FFmpeg.
  # The Updater is Windows-only, so it's disabled here. Produces FrameLift-linux-x64.tar.gz.
  #
  # ubuntu:25.04 because libsdl3-dev first ships there (24.04 LTS has only SDL2).
  build-linux:
    needs: test
    runs-on: ubuntu-latest
    container: ubuntu:25.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/native-linux-setup
        with:
          cmake-version: ${{ env.CMAKE_VERSION }}
      - name: Build
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
            VERSION_DISPLAY="$VERSION"
          else
            VERSION="0.0.0"
            VERSION_DISPLAY="git-$(echo "$GITHUB_SHA" | cut -c1-8)"
          fi
          cmake -S . -B "$BUILD_DIR" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DFRAMELIFT_BUILD_TESTS=OFF \
            -DFRAMELIFT_ENABLE_UPDATER=OFF \
            -DFRAMELIFT_VERSION="$VERSION" \
            -DFRAMELIFT_VERSION_DISPLAY="$VERSION_DISPLAY"
          cmake --build "$BUILD_DIR" --parallel
          test -f "$BUILD_DIR/FrameLift"
          test -f "$BUILD_DIR/Plugins/Playlist.so"
          (cd "$BUILD_DIR" && tar -czf FrameLift-linux-x64.tar.gz FrameLift Plugins)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FrameLift-linux
          path: ${{ env.BUILD_DIR }}/FrameLift-linux-x64.tar.gz

  # ── Plugin SDK package ──────────────────────────────────────────────────────
  # The SDK is platform-neutral source (headers + helper .cpp compiled per plugin),
  # so it's packaged in its own job. Configure (no host build) stages the `sdk`
  # install component; the clean-room build then validates the package with a native
  # compiler, outside the source tree, proving it is self-contained.
  # Produces framelift-sdk-<ver>.zip.
  build-sdk:
    needs: test
    runs-on: ubuntu-latest
    container: ubuntu:25.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/native-linux-setup
        with:
          cmake-version: ${{ env.CMAKE_VERSION }}
      - name: Package & validate SDK
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0"
          fi
          cmake -S . -B "$BUILD_DIR" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DFRAMELIFT_BUILD_TESTS=OFF \
            -DFRAMELIFT_VERSION="$VERSION"
          cmake --install "$BUILD_DIR" --prefix "$GITHUB_WORKSPACE/sdk-stage" --component sdk
          cmake -S "$GITHUB_WORKSPACE/sdk-stage" -B "$GITHUB_WORKSPACE/sdk-cleanroom" -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build "$GITHUB_WORKSPACE/sdk-cleanroom"
          test -f "$GITHUB_WORKSPACE/sdk-cleanroom/Plugins/HelloPlugin.so"
          # cmake -E tar with --format=zip avoids needing the zip package installed.
          (cd "$GITHUB_WORKSPACE/sdk-stage" && cmake -E tar cf "$GITHUB_WORKSPACE/$BUILD_DIR/framelift-sdk-${VERSION}.zip" --format=zip .)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: framelift-sdk
          path: ${{ env.BUILD_DIR }}/framelift-sdk-*.zip

  # ── Release ─────────────────────────────────────────────────────────────────
  # On v<X.Y.Z> tags, attach the build outputs to a GitHub Release with
  # auto-generated notes.
  release:
    needs: [ build-windows, build-linux, build-sdk ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/FrameLift-win64/FrameLift-win64.zip
            artifacts/FrameLift-linux/FrameLift-linux-x64.tar.gz
            artifacts/framelift-sdk/framelift-sdk-*.zip
